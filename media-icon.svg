<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6366F1"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" rx="32" fill="url(#bg)"/>
  <!-- TV Body -->
  <rect x="36" y="52" width="120" height="80" rx="8" fill="#1a1a2e" stroke="#a0a8ff" stroke-width="3"/>
  <!-- Screen -->
  <rect x="46" y="62" width="100" height="60" rx="4" fill="#252542"/>
  <!-- Screen reflection -->
  <rect x="50" y="66" width="40" height="4" rx="2" fill="#a0a8ff" opacity="0.3"/>
  <!-- Play button on screen -->
  <polygon points="86,82 86,102 106,92" fill="#8B5CF6"/>
  <!-- Stand -->
  <rect x="76" y="132" width="40" height="8" rx="2" fill="#a0a8ff"/>
  <rect x="86" y="140" width="20" height="12" rx="2" fill="#6366F1"/>
</svg>
