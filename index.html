<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banglangdang Hub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #e4e4e4;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        h1 {
            font-size: 3rem;
            color: #fff;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
            margin-bottom: 0.5rem;
        }

        .subtitle {
            color: #a4b0be;
            margin-bottom: 3rem;
            font-size: 1.1rem;
        }

        .apps {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 900px;
            width: 100%;
        }

        .app-card {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 2.5rem;
            text-decoration: none;
            color: #fff;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.08);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .app-card:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-8px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border-color: rgba(255,255,255,0.2);
        }

        .app-icon {
            font-size: 4rem;
            margin-bottom: 1.5rem;
        }

        .app-card h2 {
            font-size: 1.5rem;
            margin-bottom: 0.75rem;
        }

        .app-card p {
            color: #a4b0be;
            font-size: 0.95rem;
            line-height: 1.5;
        }

        .app-card.media { border-top: 4px solid #a0a8ff; }
        .app-card.meals { border-top: 4px solid #4ade80; }
        .app-card.coming { border-top: 4px solid #fcd34d; opacity: 0.6; }

        footer {
            margin-top: 4rem;
            color: #7f8c8d;
            font-size: 0.85rem;
        }

        @media (max-width: 600px) {
            h1 { font-size: 2rem; }
            .apps { gap: 1.5rem; }
            .app-card { padding: 2rem; }
            .app-icon { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <h1>Banglangdang</h1>
    <p class="subtitle">Family Home Hub</p>

    <div class="apps">
        <a href="https://omatty123.github.io/media-dashboard/" class="app-card media">
            <div class="app-icon">🎬</div>
            <h2>Media Dashboard</h2>
            <p>Track shows and movies we're watching, what's in the hopper, and what we've finished.</p>
        </a>

        <a href="https://family-meals-eight.vercel.app/" class="app-card meals">
            <div class="app-icon">🍽️</div>
            <h2>Family Meals</h2>
            <p>Plan weekly meals, save favorite recipes, and organize our family dining.</p>
        </a>
    </div>

    <footer>
        <p>Banglangdang Family Hub</p>
    </footer>
</body>
</html>
